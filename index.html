<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Timer app with graduated interval alerts">
  <meta name="theme-color" content="#FF6B35">
  <title>Interbells - Interval Timer</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>⏱ Interbells</h1>
    
    <div id="alertBox" class="alert-box"></div>
    
    <div class="card">
      <label class="label">Set Duration</label>
      <div class="time-display">
        <div class="input-group">
          <div class="input-field">
            <input type="number" id="minutes" min="0" max="999" value="3" class="duration-input">
            <span class="label">min</span>
          </div>
          <span class="duration-separator">:</span>
          <div class="input-field">
            <input type="number" id="seconds" min="0" max="59" value="0" class="duration-input">
            <span class="label">sec</span>
          </div>
        </div>
      </div>
      
      <label class="label">Number of Intervals</label>
      <div class="input-group">
        <div class="input-field">
          <select id="intervals">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
          </select>
        </div>
      </div>
      <div id="intervalDisplay" class="interval-display"></div>
    </div>
    
    <div class="card timer-display">
      <div id="timeLeft" class="time-left">03:00</div>
      <div id="progressBar" class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div id="intervalProgress" class="interval-progress"></div>
      <div id="statusText" class="status">Ready</div>
    </div>
    
    <div class="controls">
      <button id="startBtn" class="btn btn-start">Start</button>
      <button id="pauseBtn" class="btn btn-pause" disabled>Pause</button>
      <button id="resetBtn" class="btn btn-reset" disabled>Reset</button>
    </div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
